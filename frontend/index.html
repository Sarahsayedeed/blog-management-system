<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Management System</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="index">
    <header class="header">
      <div class="container header__inner">
        <div class="header__left">
          <a class="header__titleLink" href="/ui/">Blog Management System</a>
          <nav class="nav">
            <a class="nav__link nav__link--guest" href="/ui/register.html">Register</a>
            <a class="nav__link nav__link--guest" href="/ui/login.html">Login</a>
            <a class="nav__link" href="/ui/posts.html">Posts</a>
            <a class="nav__link" href="/ui/users.html" data-role="admin">Users</a>
          </nav>
        </div>
        <div class="header__right">
          <span id="authStatus" class="muted">Not signed in</span>
          <button id="btnLogout" class="btn btn--secondary" type="button" hidden>Logout</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card" id="alerts" hidden>
        <div id="alertText" class="alert"></div>
      </section>

      <section class="grid" data-auth="guest">
        <section class="card">
          <h2 class="card__title">Register</h2>
          <form id="formRegister" class="form">
            <label class="field">
              <span>Username</span>
              <input name="username" required minlength="3" maxlength="50" autocomplete="username" />
            </label>
            <label class="field">
              <span>Email</span>
              <input name="email" type="email" required autocomplete="email" />
            </label>
            <label class="field">
              <span>Password</span>
              <input name="password" type="password" required minlength="6" maxlength="128" autocomplete="new-password" />
            </label>
            <button class="btn" type="submit">Create account</button>
          </form>
          <p class="muted small">
            Public registration creates a <strong>READER</strong> account.
          </p>
        </section>

        <section class="card">
          <h2 class="card__title">Login</h2>
          <form id="formLogin" class="form">
            <label class="field">
              <span>Username</span>
              <input name="username" required autocomplete="username" />
            </label>
            <label class="field">
              <span>Password</span>
              <input name="password" type="password" required autocomplete="current-password" />
            </label>
            <button class="btn" type="submit">Sign in</button>
          </form>
        </section>
      </section>

      <section class="card" data-auth="authed" hidden>
        <div class="row row--space">
          <h2 class="card__title">Your Profile</h2>
          <a class="btn btn--secondary" href="/ui/posts.html">Go to Posts</a>
        </div>
        <div id="profileCard"></div>
      </section>

      <section class="card">
        <div class="row row--space">
          <h2 class="card__title">Posts</h2>
          <button id="btnRefreshPosts" class="btn btn--secondary" type="button">Refresh</button>
        </div>
        <div class="columns">
          <div class="col">
            <ul id="postsList" class="list"></ul>
            <div id="postsPagination"></div>
          </div>
          <div class="col">
            <div id="postDetails" class="panel muted">Select a post to view comments.</div>
          </div>
        </div>
      </section>

      <section class="card" id="commentsCard" hidden>
        <div class="row row--space">
          <h2 class="card__title">Comments</h2>
          <span id="commentsHint" class="muted small"></span>
        </div>

        <form id="formAddComment" class="form" hidden>
          <label class="field">
            <span>New comment</span>
            <textarea name="body" rows="3" maxlength="1000" required></textarea>
          </label>
          <button class="btn" type="submit">Add comment</button>
        </form>

        <ul id="commentsList" class="list"></ul>
        <div id="commentsPagination"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
