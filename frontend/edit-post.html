<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Post · Blog Management System</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="edit-post">
    <header class="header">
      <div class="container header__inner">
        <div class="header__left">
          <a class="header__titleLink" href="/ui/">Blog Management System</a>
          <nav class="nav">
            <a class="nav__link nav__link--guest" href="/ui/register.html">Register</a>
            <a class="nav__link nav__link--guest" href="/ui/login.html">Login</a>
            <a class="nav__link" href="/ui/posts.html">Posts</a>
            <a class="nav__link" href="/ui/users.html" data-role="admin">Users</a>
          </nav>
        </div>
        <div class="header__right">
          <span id="authStatus" class="muted">Not signed in</span>
          <button id="btnLogout" class="btn btn--secondary" type="button" hidden>Logout</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card" id="alerts" hidden>
        <div id="alertText" class="alert"></div>
      </section>

      <section class="card">
        <div class="row row--space">
          <h2 class="card__title">Edit post</h2>
          <div class="row">
            <a id="linkViewPost" class="btn btn--secondary" href="#">View</a>
            <a class="btn btn--secondary" href="/ui/posts.html">← Back</a>
          </div>
        </div>
        <p class="muted small">Only the post author or an admin can edit/delete.</p>

        <form id="formEditPost" class="form">
          <label class="field">
            <span>Title</span>
            <input id="editTitle" name="title" required minlength="3" maxlength="150" />
          </label>
          <label class="field">
            <span>Body</span>
            <textarea id="editBody" name="body" rows="10" required minlength="10"></textarea>
          </label>
          <div class="row">
            <button class="btn" type="submit">Save changes</button>
            <button id="btnDeletePost" class="btn btn--danger" type="button">Delete post</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
