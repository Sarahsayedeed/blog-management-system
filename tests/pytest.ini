[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quieter output
addopts =
    -ra
    --strict-markers
    --tb=short

# Suppress async-related warnings since we're using sync TestClient
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
